# 详细日志配置 - 专门为Qwen代理优化

user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 详细日志格式 - 进出数据完整记录
    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'urt="$upstream_response_time" '
                       'req_len=$request_length '
                       'req_id=$request_id '
                       'upstream_addr=$upstream_addr '
                       'upstream_status=$upstream_status';

    # 流式传输专用日志格式
    log_format streaming '$time_local | $remote_addr | $request_method $request_uri | '
                        'Status: $status | Bytes: $body_bytes_sent | '
                        'Upstream: $upstream_addr | Time: $request_time s | '
                        'User-Agent: $http_user_agent';

    # JSON格式日志（便于分析）
    log_format json_log escape=json '{"timestamp":"$time_iso8601",'
                                   '"remote_addr":"$remote_addr",'
                                   '"remote_user":"$remote_user",'
                                   '"request":"$request",'
                                   '"status":"$status",'
                                   '"body_bytes_sent":"$body_bytes_sent",'
                                   '"request_time":"$request_time",'
                                   '"upstream_response_time":"$upstream_response_time",'
                                   '"upstream_addr":"$upstream_addr",'
                                   '"http_user_agent":"$http_user_agent",'
                                   '"http_referer":"$http_referer",'
                                   '"request_length":"$request_length",'
                                   '"request_id":"$request_id"}';

    # 访问日志 - 使用详细格式
    access_log /var/log/nginx/access.log detailed;
    
    # 单独的流式请求日志
    access_log /var/log/nginx/streaming.log streaming;
    
    # JSON格式日志
    access_log /var/log/nginx/access.json json_log;

    sendfile on;
    keepalive_timeout 300s;
    
    # 上游服务器
    upstream qwen_backend {
        server 58.23.129.98:8000;
        keepalive 32;
    }

    server {
        listen 8765;
        
        # 详细错误日志
        error_log /var/log/nginx/error-detailed.log debug;

        location /v1/ {
            proxy_pass http://qwen_backend/v1/;
            
            # 代理头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "Bearer sk-78sadn09bjawde123e";
            
            # 流式配置
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            
            # 超时设置
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # 日志记录
            access_log /var/log/nginx/api-access.log detailed;
            
            # 记录请求体（调试用）
            # 注意：在生产环境可能需要调整日志级别
        }

        # 健康检查 - 简化日志
        location /health {
            access_log /var/log/nginx/health.log;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 状态页面
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # 日志查看接口（保护性访问）
        location /logs/ {
            alias /var/log/nginx/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            
            # 访问控制
            allow 127.0.0.1;
            deny all;
            
            access_log /var/log/nginx/log-access.log;
        }
    }
}