# Qwen3.6-35B 流式代理配置
# 端口: 8765 → 58.23.129.98:8000

user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 流式传输优化日志格式
    log_format streaming '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log streaming;

    # 流式传输优化配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 300s;  # 长连接超时
    keepalive_requests 1000;
    
    # 缓冲区优化
    client_body_buffer_size 128k;
    client_max_body_size 10M;
    
    # 代理超时设置
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    # 流式传输关键配置
    proxy_buffering off;      # 禁用缓冲，支持流式
    proxy_request_buffering off;
    
    # 上游服务器配置
    upstream qwen_backend {
        server 58.23.129.98:8000;
        
        # 连接保持
        keepalive 32;
        keepalive_timeout 300s;
    }

    server {
        listen 8765;
        server_name localhost;

        # API 路由
        location /v1/ {
            proxy_pass http://qwen_backend/v1/;
            
            # 代理头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 流式传输头
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            
            # API 密钥认证（可选，也可以在客户端设置）
            proxy_set_header Authorization "Bearer sk-78sadn09bjawde123e";
            
            # CORS 支持
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            
            # 预检请求处理
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Nginx 状态监控
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}