version: '3.8'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: qwen-proxy
    ports:
      - "8765:8765"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./logs:/var/log/nginx
    restart: unless-stopped
    environment:
      - NGINX_PORT=8765
    networks:
      - proxy-network

  # 可选：监控服务
  monitor:
    image: python:3.9-alpine
    container_name: proxy-monitor
    volumes:
      - ./monitor.py:/app/monitor.py
    command: python /app/monitor.py
    restart: unless-stopped
    depends_on:
      - nginx-proxy
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge

volumes:
  logs:
    driver: local